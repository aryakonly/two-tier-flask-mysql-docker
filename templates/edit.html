<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Product</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fffbf0;min-height:100vh}
header{background:#0f1f14;padding:0 30px;height:65px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;color:white;font-weight:bold}
.logo span{color:#2eab68}
.back{color:#9dc9b0;text-decoration:none;font-size:14px}
.wrap{max-width:580px;margin:40px auto;padding:0 20px}
h2{font-size:28px;color:#0f1f14;margin-bottom:6px}
.sub{color:#6b7280;font-size:14px;margin-bottom:20px}
.banner{background:#fef3c7;border:1.5px solid #fde68a;border-radius:10px;padding:12px 16px;color:#92400e;margin-bottom:20px;font-size:14px}
.card{background:white;border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid #fde68a}
.sec{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#d97706;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid #fde68a}
.sec:first-child{margin-top:0}
label{display:block;font-size:13px;font-weight:600;color:#0f1f14;margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 13px;border:1.5px solid #fde68a;border-radius:8px;font-size:14px;color:#0f1f14;background:#fffdf5;outline:none;margin-bottom:14px}
input:focus,select:focus,textarea:focus{border-color:#d97706;background:white}
.row{display:flex;gap:12px}
.row>div{flex:1}
.cats{display:flex;gap:8px;margin-bottom:14px}
.cats input[type=radio]{display:none}
.cats label{flex:1;text-align:center;padding:10px 6px;border:1.5px solid #fde68a;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;background:#fffdf5;margin-bottom:0}
.cats input[type=radio]:checked+label{border-color:#d97706;background:#fef3c7;color:#0f1f14}
.icon{font-size:20px;display:block;margin-bottom:3px}
.btn{width:100%;padding:13px;background:#d97706;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{background:#b45309}
</style>
</head>
<body>
<header>
<div class="logo">Fresh<span>Market</span></div>
<a class="back" href="/">Back to Store</a>
</header>
<div class="wrap">
<h2>Edit Product</h2>
<div class="sub">Update the details below.</div>
<div class="banner">Editing: <strong>{{ product.name }}</strong></div>
<div class="card">
<form method="POST" action="/edit/{{ product.id }}">
<div class="sec">Product Info</div>
<label>Name</label>
<input type="text" name="name" value="{{ product.name }}" required>
<label>Category</label>
<div class="cats">
<div>
<input type="radio" name="category" id="c1" value="Fruits" {% if product.category == 'Fruits' %}checked{% endif %}>
<label for="c1"><span class="icon">🍎</span>Fruits</label>
</div>
<div>
<input type="radio" name="category" id="c2" value="Vegetables" {% if product.category == 'Vegetables' %}checked{% endif %}>
<label for="c2"><span class="icon">🥦</span>Vegetables</label>
</div>
<div>
<input type="radio" name="category" id="c3" value="Bakery" {% if product.category == 'Bakery' %}checked{% endif %}>
<label for="c3"><span class="icon">🍞</span>Bakery</label>
</div>
</div>
<div class="sec">Price and Stock</div>
<div class="row">
<div>
<label>Price</label>
<input type="number" name="price" value="{{ product.price }}" step="0.01" min="0" required>
</div>
<div>
<label>Quantity</label>
<input type="number" name="quantity" value="{{ product.quantity }}" min="0" required>
</div>
</div>
<label>Unit</label>
<select name="unit" required>
<option value="kg" {% if product.unit == 'kg' %}selected{% endif %}>kg</option>
<option value="g" {% if product.unit == 'g' %}selected{% endif %}>g</option>
<option value="piece" {% if product.unit == 'piece' %}selected{% endif %}>piece</option>
<option value="dozen" {% if product.unit == 'dozen' %}selected{% endif %}>dozen</option>
<option value="litre" {% if product.unit == 'litre' %}selected{% endif %}>litre</option>
<option value="pack" {% if product.unit == 'pack' %}selected{% endif %}>pack</option>
</select>
<div class="sec">Description</div>
<label>Notes (optional)</label>
<textarea name="description" rows="3">{{ product.description or '' }}</textarea>
<button type="submit" class="btn">Update Product</button>
</form>
</div>
</div>
</body>
</html>
