<!DOCTYPE html>
<html>
<head>
  <title>Edit Product</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0fdf4; }
    header { background: #d97706; color: white; padding: 20px 30px; }
    header h1 { font-size: 22px; }
    .container { padding: 30px; }
    form { background: white; padding: 28px; border-radius: 10px; max-width: 520px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    label { display: block; margin-top: 14px; font-weight: bold; color: #555; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 9px 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #d97706; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button { margin-top: 22px; background: #d97706; color: white; padding: 11px 28px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; width: 100%; }
    button:hover { background: #b45309; }
    .back { display: inline-block; margin-top: 14px; color: #16a34a; text-decoration: none; }
  </style>
</head>
<body>
  <header><h1>✏️ Edit Product — {{ product.name }}</h1></header>
  <div class="container">
    <form method="POST" action="/edit/{{ product.id }}">

      <label>Product Name</label>
      <input type="text" name="name" value="{{ product.name }}" required>

      <label>Category</label>
      <select name="category" required>
        <option value="Fruits" {% if product.category == 'Fruits' %}selected{% endif %}>🍎 Fruits</option>
        <option value="Vegetables" {% if product.category == 'Vegetables' %}selected{% endif %}>🥦 Vegetables</option>
        <option value="Bakery" {% if product.category == 'Bakery' %}selected{% endif %}>🍞 Bakery</option>
      </select>

      <div class="row">
        <div>
          <label>Price (₹)</label>
          <input type="number" name="price" value="{{ product.price }}" step="0.01" min="0" required>
        </div>
        <div>
          <label>Quantity</label>
          <input type="number" name="quantity" value="{{ product.quantity }}" min="0" required>
        </div>
      </div>

      <label>Unit</label>
      <select name="unit" required>
        <option value="kg"     {% if product.unit == 'kg'     %}selected{% endif %}>kg</option>
        <option value="g"      {% if product.unit == 'g'      %}selected{% endif %}>g</option>
        <option value="piece"  {% if product.unit == 'piece'  %}selected{% endif %}>piece</option>
        <option value="dozen"  {% if product.unit == 'dozen'  %}selected{% endif %}>dozen</option>
        <option value="litre"  {% if product.unit == 'litre'  %}selected{% endif %}>litre</option>
        <option value="pack"   {% if product.unit == 'pack'   %}selected{% endif %}>pack</option>
      </select>

      <label>Description (optional)</label>
      <textarea name="description" rows="2">{{ product.description or '' }}</textarea>

      <button type="submit">✅ Update Product</button>
    </form>
    <a class="back" href="/">← Back to Store</a>
  </div>
</body>
</html>
