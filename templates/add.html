<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Product — FreshMarket</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #1a7a4a;
        --green-mid: #2eab68;
        --dark: #0f1f14;
        --gray: #6b7280;
        --border: #d1e9db;
        --bg: #f5faf6;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        min-height: 100vh;
      }

      header {
        background: var(--dark);
        padding: 0 40px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: white;
      }
      .logo span {
        color: var(--green-mid);
      }
      .back-btn {
        color: #9dc9b0;
        text-decoration: none;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
      }
      .back-btn:hover {
        color: white;
      }

      .page-wrap {
        max-width: 600px;
        margin: 50px auto;
        padding: 0 20px;
      }

      .page-title {
        font-family: "Playfair Display", serif;
        font-size: 32px;
        color: var(--dark);
        margin-bottom: 6px;
      }
      .page-sub {
        color: var(--gray);
        font-size: 14px;
        margin-bottom: 30px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border);
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--green);
        margin: 24px 0 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .section-label:first-child {
        margin-top: 0;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 6px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #e0ede6;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        color: var(--dark);
        background: #fafcfb;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        outline: none;
        margin-bottom: 16px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--green-mid);
        box-shadow: 0 0 0 3px rgba(46, 171, 104, 0.12);
        background: white;
      }

      .row {
        display: flex;
        gap: 14px;
      }
      .row > div {
        flex: 1;
      }

      /* category pills */
      .cat-options {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .cat-options input[type="radio"] {
        display: none;
      }
      .cat-options label {
        flex: 1;
        text-align: center;
        padding: 12px 8px;
        border: 1.5px solid #e0ede6;
        border-radius: 12px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--gray);
        background: #fafcfb;
        transition: all 0.2s;
        margin-bottom: 0;
      }
      .cat-options input[type="radio"]:checked + label {
        border-color: var(--green-mid);
        background: var(--bg);
        color: var(--dark);
        box-shadow: 0 0 0 3px rgba(46, 171, 104, 0.12);
      }
      .cat-icon {
        font-size: 22px;
        display: block;
        margin-bottom: 4px;
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        background: var(--dark);
        color: white;
        border: none;
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }
      .btn-submit:hover {
        background: var(--green);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(26, 122, 74, 0.3);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">🌿 Fresh<span>Market</span></div>
      <a class="back-btn" href="/">← Back to Store</a>
    </header>

    <div class="page-wrap">
      <div class="page-title">➕ Add Product</div>
      <div class="page-sub">Fill in the details to add a new grocery item.</div>

      <div class="card">
        <form method="POST" action="/add">
          <div class="section-label">Product Info</div>

          <label>Product Name</label>
          <input
            type="text"
            name="name"
            placeholder="e.g. Apple, Broccoli, Croissant"
            required
          />

          <label>Category</label>
          <div class="cat-options">
            <div>
              <input
                type="radio"
                name="category"
                id="cat-fruits"
                value="Fruits"
                required
              />
              <label for="cat-fruits"
                ><span class="cat-icon">🍎</span>Fruits</label
              >
            </div>
            <div>
              <input
                type="radio"
                name="category"
                id="cat-veg"
                value="Vegetables"
              />
              <label for="cat-veg"
                ><span class="cat-icon">🥦</span>Vegetables</label
              >
            </div>
            <div>
              <input type="radio" name="category" id="cat-bak" value="Bakery" />
              <label for="cat-bak"
                ><span class="cat-icon">🍞</span>Bakery</label
              >
            </div>
          </div>

          <div class="section-label">Pricing & Stock</div>

          <div class="row">
            <div>
              <label>Price (₹)</label>
              <input
                type="number"
                name="price"
                placeholder="0.00"
                step="0.01"
                min="0"
                required
              />
            </div>
            <div>
              <label>Quantity</label>
              <input
                type="number"
                name="quantity"
                placeholder="0"
                min="0"
                required
              />
            </div>
          </div>

          <label>Unit</label>
          <select name="unit" required>
            <option value="">-- Select Unit --</option>
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="piece">piece</option>
            <option value="dozen">dozen</option>
            <option value="litre">litre</option>
            <option value="pack">pack</option>
          </select>

          <div class="section-label">Extra Details</div>

          <label
            >Description
            <span style="color: #9ca3af; font-weight: 400"
              >(optional)</span
            ></label
          >
          <textarea
            name="description"
            rows="3"
            placeholder="Fresh, organic, imported..."
          ></textarea>

          <button type="submit" class="btn-submit">💾 Save Product</button>
        </form>
      </div>
    </div>
  </body>
</html>
