<!doctype html>
<html>
  <head>
    <title>Add Product</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f0fdf4;
      }
      header {
        background: #16a34a;
        color: white;
        padding: 20px 30px;
      }
      header h1 {
        font-size: 22px;
      }
      .container {
        padding: 30px;
      }
      form {
        background: white;
        padding: 28px;
        border-radius: 10px;
        max-width: 520px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
      }
      label {
        display: block;
        margin-top: 14px;
        font-weight: bold;
        color: #555;
        font-size: 14px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 9px 12px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #16a34a;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row > div {
        flex: 1;
      }
      button {
        margin-top: 22px;
        background: #16a34a;
        color: white;
        padding: 11px 28px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        width: 100%;
      }
      button:hover {
        background: #15803d;
      }
      .back {
        display: inline-block;
        margin-top: 14px;
        color: #16a34a;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header><h1>➕ Add New Product</h1></header>
    <div class="container">
      <form method="POST" action="/add">
        <label>Product Name</label>
        <input
          type="text"
          name="name"
          placeholder="e.g. Apple, Tomato, Croissant"
          required
        />

        <label>Category</label>
        <select name="category" required>
          <option value="">-- Select Category --</option>
          {% for cat in categories %}
          <option value="{{ cat }}">
            {% if cat == 'Fruits' %}🍎{% elif cat == 'Vegetables' %}🥦{% else
            %}🍞{% endif %} {{ cat }}
          </option>
          {% endfor %}
        </select>

        <div class="row">
          <div>
            <label>Price (₹)</label>
            <input
              type="number"
              name="price"
              placeholder="0.00"
              step="0.01"
              min="0"
              required
            />
          </div>
          <div>
            <label>Quantity</label>
            <input
              type="number"
              name="quantity"
              placeholder="0"
              min="0"
              required
            />
          </div>
        </div>

        <label>Unit</label>
        <select name="unit" required>
          <option value="">-- Select Unit --</option>
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="piece">piece</option>
          <option value="dozen">dozen</option>
          <option value="litre">litre</option>
          <option value="pack">pack</option>
        </select>

        <label>Description (optional)</label>
        <textarea
          name="description"
          rows="2"
          placeholder="Fresh, organic..."
        ></textarea>

        <button type="submit">💾 Save Product</button>
      </form>
      <a class="back" href="/">← Back to Store</a>
    </div>
  </body>
</html>
